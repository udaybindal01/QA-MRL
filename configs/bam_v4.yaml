# BAM v4: Bloom-Aligned Matryoshka with Option B (scattered soft mask) + all v5 training features.
# Keep configs/bam.yaml as-is so BAM v3/v4-A baseline still runs cleanly.

model:
  backbone: "BAAI/bge-base-en-v1.5"
  embedding_dim: 768
  pooling: "cls"
  normalize_embeddings: true
  mrl_dims: [64, 128, 256, 384, 512, 768]
  use_mask_routing: true         # Option B: BloomMaskHead scattered soft mask
  mask_sparsity_target: null    # null = use per-level cognitive defaults (see mask_level_targets)
  use_soft_bloom_routing: false  # N/A for Option B (mask head handles routing)

data:
  train_path: "./data/real/train.jsonl"
  val_path: "./data/real/val.jsonl"
  test_path: "./data/real/test.jsonl"
  corpus_path: "./data/real/corpus.jsonl"
  bloom_levels: {1: "Remember", 2: "Understand", 3: "Apply", 4: "Analyze", 5: "Evaluate", 6: "Create"}
  subjects: ["biology", "chemistry", "physics", "earth_science", "general_science"]
  max_query_length: 128
  max_passage_length: 256
  num_hard_negatives: 3

training:
  seed: 42
  num_epochs: 15
  batch_size: 16
  gradient_accumulation_steps: 8
  fp16: true
  max_grad_norm: 1.0
  optimizer:
    type: "adamw"
    lr: 2.0e-5
    weight_decay: 0.01
    encoder_lr: 2.0e-5
    router_lr: 2.0e-4           # BloomMaskHead MLP gets 10x encoder LR
  scheduler:
    type: "cosine"
    warmup_ratio: 0.1
  use_pcgrad: false              # Set true to enable gradient surgery
  encoder_freeze_after_epochs: null  # Keep joint training — scattered mask needs encoder to keep adapting
  bloom_noise_rate: 0.05         # 5% Bloom label flip rate for robustness
  loss:
    contrastive_weight: 1.0
    efficiency_weight: 0.0       # OFF for Option B: sparsity loss controls compression.
                                 # Efficiency + sparsity together over-compressed to 132 dims.
    mrl_anchor_weight: 0.05      # Reduced from 0.2: MRL anchor enforces prefix-dim structure
                                 # which conflicts with scattered mask selection.
    diversity_weight: 0.0        # Not used for Option B (no prefix dims to spread)
    mask_sparsity_weight: 0.25   # Sole compression signal now efficiency is off. Stronger
                                 # to maintain per-level targets against contrastive pressure.
    mask_diversity_weight: 0.15  # Push different Bloom levels to select different dims.
    mask_diversity_margin: 0.3   # Tight margin (was 0.7). At sim=0.97, penalty=0.67 vs 0.27.
    mask_level_targets:          # Cognitive load hypothesis: higher Bloom → more dims.
      0: 0.40                    # Remember   → 307 dims (simple recall)
      1: 0.45                    # Understand → 346 dims
      2: 0.50                    # Apply      → 384 dims
      3: 0.55                    # Analyze    → 422 dims
      4: 0.60                    # Evaluate   → 461 dims
      5: 0.65                    # Create     → 499 dims
    encoder_warmup_epochs: 0     # Must be 0 for Option B: efficiency_weight=0 throughout,
                                 # so no warmup concept. Non-zero value causes find_best_epoch
                                 # to wrongly skip eligible epochs from best-epoch selection.
    temperature_schedule:
      start: 0.1
      end: 0.02
    # bloom_frequencies injected at runtime by train_bam.py
  checkpoint_dir: "/tmp/bam-v4-ckpts/"
  save_every_n_steps: 1000
  eval_every_n_steps: 500

evaluation:
  retrieval_ks: [1, 5, 10, 20, 50, 100]
  bloom_stratified: true
  tail_topic_threshold: 20
  measure_latency: true

diagnostics:
  gradient_attribution: true
  num_diagnostic_queries: 1000
  probing:
    probe_type: "linear"
    probe_tasks: ["bloom_level", "subject_area"]
    num_dimension_groups: 8

logging:
  use_wandb: true
  wandb_project: "bam-emnlp"
  wandb_entity: null
  log_every_n_steps: 10
