# BAM: Bloom-Aligned Matryoshka — Educational Retrieval Config

model:
  backbone: "BAAI/bge-base-en-v1.5"
  embedding_dim: 768
  pooling: "cls"
  normalize_embeddings: true
  mrl_dims: [64, 128, 256, 384, 512, 768]
  policy:
    hidden_dim: 256
    temperature: 1.0
  # Legacy compat fields (not used by BAM but needed by data loader)
  router:
    type: "group"
    num_groups: 8
    group_size: 96
    hidden_dim: 256
    temperature: 1.0
    min_active_groups: 2
    max_active_groups: 6
    use_learner_features: false
    learner_feature_dim: 32
  asymmetric:
    enabled: false
    doc_router_hidden_dim: 128

data:
  train_path: "/tmp/data/real/train.jsonl"
  val_path: "/tmp/data/real/val.jsonl"
  test_path: "/tmp/data/real/test.jsonl"
  corpus_path: "/tmp/data/real/corpus.jsonl"
  bloom_levels: {1: "Remember", 2: "Understand", 3: "Apply", 4: "Analyze", 5: "Evaluate", 6: "Create"}
  subjects: ["biology", "chemistry", "physics", "earth_science", "general_science"]
  max_query_length: 128
  max_passage_length: 256
  num_hard_negatives: 3

training:
  seed: 42
  num_epochs: 15
  batch_size: 16
  gradient_accumulation_steps: 8
  fp16: true
  max_grad_norm: 1.0
  optimizer:
    type: "adamw"
    lr: 2.0e-5
    weight_decay: 0.01
    encoder_lr: 2.0e-5
    router_lr: 1.0e-3           # BloomDimRouter has only 6 params — needs high LR
  scheduler:
    type: "cosine"
    warmup_ratio: 0.1
  loss:
    contrastive_weight: 1.0
    efficiency_weight: 0.3
    mrl_anchor_weight: 0.2   # Keep encoder sharp at MRL anchor dims [64,128,256,384,512,768]

    # Bilateral target dims per Bloom level (as ratio of 768).
    # Model is pulled toward these targets from both directions.
    # Remember→154, Understand→230, Apply→323, Analyze→430, Evaluate→538, Create→653
    bloom_target_ratios: [0.20, 0.30, 0.42, 0.56, 0.70, 0.85]

    # Inverse-sqrt class weights for imbalanced Bloom distribution.
    # Computed from dataset: Remember 64%, Apply 16%, Create 9%, Analyze 6%, Evaluate 4%, Understand 2%
    # Formula: 1/sqrt(freq), normalized so mean=1 (keeps overall loss scale unchanged).
    class_weights: [0.30, 2.00, 0.62, 1.01, 1.24, 0.83]
  checkpoint_dir: "/tmp/bam-ckpts/"
  save_every_n_steps: 1000
  eval_every_n_steps: 500

evaluation:
  retrieval_ks: [1, 5, 10, 20, 50, 100]
  bloom_stratified: true
  tail_topic_threshold: 20
  measure_latency: true

diagnostics:
  gradient_attribution: true
  num_diagnostic_queries: 1000
  probing:
    probe_type: "linear"
    probe_tasks: ["bloom_level", "subject_area"]
    num_dimension_groups: 8

logging:
  use_wandb: true
  wandb_project: "bam-emnlp"
  wandb_entity: null
  log_every_n_steps: 10