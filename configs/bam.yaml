# BAM: Bloom-Aligned Matryoshka — Educational Retrieval Config

model:
  backbone: "BAAI/bge-base-en-v1.5"
  embedding_dim: 768
  pooling: "cls"
  normalize_embeddings: true
  mrl_dims: [64, 128, 256, 384, 512, 768]
  use_mask_routing: false        # Option B: scattered soft mask (BloomMaskHead). false = Option A (prefix mask)
  mask_sparsity_target: 0.44    # 339/768 — only used when use_mask_routing=true
  use_soft_bloom_routing: false  # Option A: softmax @ all_dims instead of argmax lookup

data:
  train_path: "./data/real/train.jsonl"
  val_path: "./data/real/val.jsonl"
  test_path: "./data/real/test.jsonl"
  corpus_path: "./data/real/corpus.jsonl"
  bloom_levels: {1: "Remember", 2: "Understand", 3: "Apply", 4: "Analyze", 5: "Evaluate", 6: "Create"}
  subjects: ["biology", "chemistry", "physics", "earth_science", "general_science"]
  max_query_length: 128
  max_passage_length: 256
  num_hard_negatives: 3

training:
  seed: 42
  num_epochs: 15
  batch_size: 16
  gradient_accumulation_steps: 8
  fp16: true
  max_grad_norm: 1.0
  optimizer:
    type: "adamw"
    lr: 2.0e-5
    weight_decay: 0.01
    encoder_lr: 2.0e-5
    router_lr: 2.0e-4           # BloomDimRouter MLP (~800 params) — 10x encoder LR
  scheduler:
    type: "cosine"
    warmup_ratio: 0.1
  loss:
    contrastive_weight: 1.0
    efficiency_weight: 0.1      # Two-factor loss (cognitive × frequency) with Kaiming init.
                                # 0.3 over-compressed (dims hit ~242 by epoch 8, NDCG dropped to 0.528).
                                # with frozen encoder (encoder can't adapt to resist compression).
    mrl_anchor_weight: 0.2      # Keep encoder sharp at MRL anchor dims
    diversity_weight: 0.0       # REMOVED. RouterDiversityLoss was always a workaround for the
                                # zero-init trap (dim_head[2].weight=0 blocked bloom_emb gradients).
                                # With Kaiming init fix, gradients flow properly. Diversity applies to
                                # ALL 6 levels every step (via _all_dims()), but efficiency only to
                                # levels in the batch — rare levels (Understand 1.4%, Evaluate ~5%)
                                # were governed entirely by diversity → wrong ordering by random init
                                # (Understand→463, Evaluate→429 was backwards). Efficiency alone with
                                # cognitive weights gives the correct ordering: Remember↓, Create↑.
    mask_sparsity_weight: 0.1   # Sparsity loss weight (Option B only)
    mask_diversity_weight: 0.05 # Mask diversity loss weight (Option B only)
    encoder_warmup_epochs: 5    # Restored to 5. Without diversity there is no warmup anchoring at 768,
                                # so 5 epochs is safe. Encoder develops compact representations via MRL
                                # anchor loss before efficiency activates, reducing contrastive
                                # resistance when compression starts → cleaner cognitive ordering.
    temperature_schedule:
      start: 0.1                # Warm start — smooth gradients while encoder is learning
      end: 0.02                 # Cold end — sharp distribution that specifically improves R@1
    # bloom_frequencies injected at runtime by train_bam.py from training data
  use_pcgrad: false                 # PCGrad gradient surgery — off by default
  encoder_freeze_after_epochs: null  # No freeze — encoder trains throughout.
                                    # Two-factor efficiency creates sufficient gradient differential:
                                    # Remember pressure=2.32 vs Create pressure=0.14 (ratio 16.6×).
                                    # Even if encoder resists globally, Remember gets pulled down
                                    # much harder than Create → natural per-level differentiation
                                    # without freezing.
                                    # Frozen encoder cannot fight back; router trains in isolation and
                                    # efficiency cleanly controls dim selection per Bloom level.
  bloom_noise_rate: 0.0             # Label noise augmentation (0 = disabled, 0.05 = 5% flip rate)
  hard_neg_refresh_epochs: null     # Refresh hard negatives every N epochs (null = disabled).
                                    # Uses current model to re-mine negatives against full corpus.
                                    # Set to 3-5 for dynamic hard negative mining.
  checkpoint_dir: "/tmp/bam-ckpts/"
  save_every_n_steps: 1000
  eval_every_n_steps: 500

evaluation:
  retrieval_ks: [1, 5, 10, 20, 50, 100]
  bloom_stratified: true
  tail_topic_threshold: 20
  measure_latency: true

diagnostics:
  gradient_attribution: true
  num_diagnostic_queries: 1000
  probing:
    probe_type: "linear"
    probe_tasks: ["bloom_level", "subject_area"]
    num_dimension_groups: 8

logging:
  use_wandb: true
  wandb_project: "bam-emnlp"
  wandb_entity: null
  log_every_n_steps: 10
