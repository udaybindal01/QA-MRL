# BAM Option B: Bloom Static Scattered Mask (BloomMaskHead)
#
# Routing: Embedding(6, 768) → Gumbel-Softmax → scattered binary mask per Bloom level
# One fixed mask per Bloom level. Active dims are scattered — NOT FAISS sub-index compatible.
# Retrieval: normalize(q * mask_b) · normalize(corpus * mask_b) (pre-masked per level).
#
# SMEC-inspired improvements (arXiv 2510.12474):
#   1. Gumbel-Softmax replaces STE for discrete dimension selection (§3.3 ADS module)
#   2. 3-stage sequential loss schedule reduces gradient variance (§3.2 SMRL)
#   3. Unsupervised distillation loss forces masked embedding to preserve full-dim similarity (§3.4)
#   4. Increased hard negatives for stronger contrastive signal
#
# Prerequisite: optionA-working_pipeline.sh must have been run first.
#
# Loss schedule (2 stages):
#   Stage 1 (epochs 0-2):  contrastive + mrl_anchor + distillation
#   Stage 2 (epochs 3+):   + efficiency (cognitive weights) + mask_diversity + mask_variance + sparsity
#                            distillation continues all 15 epochs (quality signal)
#
# Run 4 (current):
#   - Soft mask training + efficiency + global sparsity budget
#   - Diagnosis run 4: with soft mask, contrastive (1.0) beats efficiency (0.2) — dims grew 443→458.
#     Root cause: soft sigmoid means all dims help contrastive loss, so all logits get pushed up.
#     Fix: global sparsity target 0.33 (254 dims) with weight 0.4 → direct budget constraint.
#   - Efficiency (0.2, cognitive weights) handles per-level ordering WITHIN the budget.
#   - mask_level_targets removed — global target + efficiency equilibrium finds natural per-level dims.

model:
  backbone: "BAAI/bge-base-en-v1.5"
  embedding_dim: 768
  pooling: "cls"
  normalize_embeddings: true
  mrl_dims: [64, 128, 256, 384, 512, 768]
  use_mask_routing: true             # Option B: BloomMaskHead scattered mask
  mask_sparsity_target: 0.33          # Global budget: 0.33 × 768 ≈ 254 dims (matching Option A avg=234).
                                     # Passed to BloomMaskSparsityLoss as uniform target across levels.
                                     # Efficiency handles per-level ordering on top of this budget.
  use_soft_bloom_routing: false      # N/A for Option B

data:
  train_path: "./data/real/train_curriculum.jsonl"
  val_path: "./data/real/val.jsonl"
  test_path: "./data/real/test.jsonl"
  corpus_path: "./data/real/corpus.jsonl"
  bloom_levels: {1: "Remember", 2: "Understand", 3: "Apply", 4: "Analyze", 5: "Evaluate", 6: "Create"}
  subjects: ["biology", "chemistry", "physics", "earth_science", "general_science"]
  max_query_length: 128
  max_passage_length: 256
  num_hard_negatives: 7              # Was 3. More diverse negatives per SMEC S-XBM insight.
                                     # NOTE: re-run data/curriculum_negatives.py if data was
                                     # mined with 3 negatives (it will pad/truncate otherwise).

training:
  seed: 42
  num_epochs: 15
  batch_size: 16
  gradient_accumulation_steps: 8
  fp16: true
  max_grad_norm: 1.0
  optimizer:
    type: "adamw"
    lr: 2.0e-5
    weight_decay: 0.01
    encoder_lr: 2.0e-5             # Restored to 2e-5. 5e-5 caused encoder quality collapse:
                                   # Apply at 236 dims → 0.3103, worse than unrouted BAM at 256 dims
                                   # (0.4443). Higher LR hypothesis was wrong — encoder degraded.
    router_lr: 2.0e-4              # BloomMaskHead bloom_logit — 10x encoder LR
  scheduler:
    type: "cosine"
    warmup_ratio: 0.1
  loss:
    contrastive_weight: 1.0
    efficiency_weight: 0.2         # Restored with cognitive weights (1-b/6). Like Option A:
                                   # let contrastive + efficiency equilibrium determine natural
                                   # per-level dims. Per-level targets imposed wrong ordering
                                   # (Option A learned Understand/Evaluate=432, not cognitive order).
    efficiency_uniform_weights: false  # Use cognitive weights (1-b/6):
                                       # Remember=1.0, Understand=0.833, ..., Create=0.167.
                                       # Same approach as Option A.
    mrl_anchor_weight: 0.1         # Restored (was 0.0). Removing anchor entirely caused encoder
                                   # collapse: Apply 236 dims → 0.3103 < unrouted encoder 0.4443.
                                   # Anchor keeps the encoder from catastrophically forgetting its
                                   # pre-trained retrieval quality. Reduced 0.2→0.1 to give encoder
                                   # slightly more freedom to adapt to scatter masks.
    diversity_weight: 0.0          # RouterDiversityLoss is prefix-dim only (Option A)
    mask_sparsity_weight: 0.4      # Re-added. Efficiency alone can't overcome contrastive (1.0):
                                   # with soft mask, contrastive pushes ALL logits up (more dims=better
                                   # embedding). Dims grew 443→458 despite efficiency=0.2.
                                   # Sparsity directly enforces global budget: |mean(soft_mask)-target|.
    mask_level_targets: null       # Global target applies uniformly. Efficiency handles per-level ordering.
    mask_diversity_weight: 0.3     # Penalize identical masks across Bloom levels.
    mask_variance_weight: 0.3      # Per-dim variance across levels. Keep at 0.3 (working).
    mask_distill_weight: 0.3       # Distillation is a net quality positive — always on.
    encoder_warmup_epochs: 3       # Was 5. Shorter Stage 1: encoder starts from MRL checkpoint
                                   # (already pre-trained), doesn't need 5 epochs of free-form
                                   # contrastive drift before sparsity kicks in. Logit init is
                                   # now Gumbel-calibrated so it starts at target and we want
                                   # sparsity to anchor it there ASAP.
    mask_differentiation_epochs: 3 # Same as encoder_warmup_epochs → Stage 2 adds all losses at once
    temperature_schedule:
      start: 0.1
      end: 0.02
    gumbel_temperature_schedule:   # Anneals BloomMaskHead.gumbel_temperature each epoch
      start: 1.0                   # High τ: smoother/more exploratory discrete selection
      end: 0.1                     # Low τ: sharper, more deterministic (closer to hard mask)
    # bloom_frequencies injected at runtime by train_bam.py
  use_pcgrad: false
  encoder_freeze_after_epochs: null
  bloom_noise_rate: 0.0
  hard_neg_refresh_epochs: null
  checkpoint_dir: "/tmp/bam-b-ckpts3/"
  save_every_n_steps: 1000
  eval_every_n_steps: 500

evaluation:
  retrieval_ks: [1, 5, 10, 20, 50, 100]
  bloom_stratified: true
  tail_topic_threshold: 20
  measure_latency: true

diagnostics:
  gradient_attribution: true
  num_diagnostic_queries: 1000
  probing:
    probe_type: "linear"
    probe_tasks: ["bloom_level", "subject_area"]
    num_dimension_groups: 8

logging:
  use_wandb: true
  wandb_project: "bam-emnlp"
  wandb_entity: null
  log_every_n_steps: 10
