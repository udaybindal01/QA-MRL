# BAM Option B: Bloom Static Scattered Mask (BloomMaskHead)
#
# Routing: Embedding(6, 768) → Gumbel-Softmax → scattered binary mask per Bloom level
# One fixed mask per Bloom level. Active dims are scattered — NOT FAISS sub-index compatible.
# Retrieval: normalize(q * mask_b) · normalize(corpus * mask_b) (pre-masked per level).
#
# SMEC-inspired improvements (arXiv 2510.12474):
#   1. Soft mask during training (no STE): SMEC §3.3 — gradients flow to all dims
#   2. Top-k eval with learned k: k = round(mean(sigmoid(logits)) * 768)
#   3. Gumbel temperature τ→0.1: soft mask approaches binary by end of training
#   4. Unsupervised distillation loss preserves full-dim similarity structure (§3.4)
#
# Prerequisite: optionA-working_pipeline.sh must have been run first (provides MRL init).
#
# Loss schedule (2 stages):
#   Stage 1 (epochs 0-2):  contrastive + distillation
#   Stage 2 (epochs 3+):   + efficiency + sparsity + mask_diversity
#                            distillation continues all epochs (quality signal)
#
# Run 8 (current) — back to MRL init, tighter config:
#   - MRL init restored: base init failed (lost domain adaptation, Apply 0.3724→0.3241)
#   - mrl_anchor kept at 0.0: anchor runs InfoNCE at prefix dims [64,128,...,768], which
#     REINFORCES prefix structure in encoder — exactly wrong for scatter masks. Distillation
#     covers quality without this prefix bias.
#   - Sparsity budget restored (0.4, target=0.33): efficiency alone can't overcome contrastive
#     with soft mask (dims grew 443→458). Need explicit budget constraint.
#   - Uniform efficiency weights: cognitive weights (1-b/6) don't match data
#     (Option A learned Understand/Evaluate=432, not monotone with cognitive level)
#   - Diversity margin 0.0 → 0.0: penalize full cosine similarity (was 0.3, only 0.14-0.22 effective)
#   - Diversity weight 0.3 → 0.5: stronger differentiation signal
#   - encoder_warmup 5 → 3: MRL init already domain-adapted, 3 epochs enough before compression
#   - τ_end 0.01 → 0.1: 0.01 caused Gumbel noise to dominate (high variance late training);
#     0.1 was best empirically (run 4 got R@10=0.5767)
#   - num_epochs 25 → 15: MRL init doesn't need extra epochs

model:
  backbone: "BAAI/bge-base-en-v1.5"
  embedding_dim: 768
  pooling: "cls"
  normalize_embeddings: true
  mrl_dims: [64, 128, 256, 384, 512, 768]
  use_mask_routing: true             # Option B: BloomMaskHead scattered mask
  mask_sparsity_target: 0.33         # Global budget: 0.33 × 768 ≈ 254 dims ≈ Option A avg=234.
                                     # Passed to BloomMaskSparsityLoss as uniform target.
  use_soft_bloom_routing: false      # N/A for Option B

data:
  train_path: "./data/real/train_curriculum.jsonl"
  val_path: "./data/real/val.jsonl"
  test_path: "./data/real/test.jsonl"
  corpus_path: "./data/real/corpus.jsonl"
  bloom_levels: {1: "Remember", 2: "Understand", 3: "Apply", 4: "Analyze", 5: "Evaluate", 6: "Create"}
  subjects: ["biology", "chemistry", "physics", "earth_science", "general_science"]
  max_query_length: 128
  max_passage_length: 256
  num_hard_negatives: 7

training:
  seed: 42
  num_epochs: 15
  batch_size: 16
  gradient_accumulation_steps: 8
  fp16: true
  max_grad_norm: 1.0
  optimizer:
    type: "adamw"
    lr: 2.0e-5
    weight_decay: 0.01
    encoder_lr: 2.0e-5
    router_lr: 2.0e-4              # BloomMaskHead bloom_logit — 10x encoder LR
  scheduler:
    type: "cosine"
    warmup_ratio: 0.1
  loss:
    contrastive_weight: 1.0
    efficiency_weight: 0.5         # Enough to compress with soft mask (0.2 was insufficient).
    efficiency_uniform_weights: true   # Uniform weights — cognitive ordering (1-b/6) doesn't
                                       # match data (Option A: Understand/Evaluate=432, not monotone).
    mrl_anchor_weight: 0.0         # Intentionally 0. MRL anchor runs InfoNCE at prefix dims
                                   # [64,128,256,...], reinforcing prefix structure in encoder.
                                   # This is exactly wrong for scattered masks. Distillation
                                   # (0.3) provides quality signal without prefix bias.
    diversity_weight: 0.0          # RouterDiversityLoss is prefix-dim only (Option A)
    mask_sparsity_weight: 0.4      # Budget enforcer: |mean(soft_mask) - 0.33| ≈ 0.
                                   # Without this, contrastive inflates dims to 450+ despite
                                   # efficiency at 0.5.
    mask_level_targets: null       # Global uniform target (mask_sparsity_target=0.33).
    mask_diversity_weight: 0.5     # Increased 0.3→0.5. Masks are too similar (0.44-0.52).
                                   # Diversity is the only signal pushing 6 embedding vectors apart.
    mask_diversity_margin: 0.0     # Penalize full cosine similarity. With margin=0.3 (old default),
                                   # effective penalty was only 0.14-0.22 per pair. At 0.0:
                                   # full 0.44-0.52 is penalized — ~3x stronger gradient.
    mask_variance_weight: 0.0      # Redundant with diversity.
    mask_distill_weight: 0.3       # Always-on quality signal. Replaces mrl_anchor without
                                   # introducing prefix bias.
    encoder_warmup_epochs: 3       # MRL init already domain-adapted — 3 epochs enough before
                                   # compression activates (was 5 for base init).
    mask_differentiation_epochs: 3 # Same as encoder_warmup_epochs.
    temperature_schedule:
      start: 0.1
      end: 0.02
    gumbel_temperature_schedule:   # Anneals BloomMaskHead.gumbel_temperature each epoch
      start: 1.0                   # High τ: exploratory
      end: 0.1                     # τ=0.01 was too aggressive (Gumbel noise dominated logits,
                                   # high variance late training). τ=0.1 was best empirically
                                   # (run 4: R@10=0.5767).
    # bloom_frequencies injected at runtime by train_bam.py
  use_pcgrad: false
  encoder_freeze_after_epochs: null
  bloom_noise_rate: 0.0
  hard_neg_refresh_epochs: null
  checkpoint_dir: "/tmp/bam-b-ckpts3/"
  save_every_n_steps: 1000
  eval_every_n_steps: 500

evaluation:
  retrieval_ks: [1, 5, 10, 20, 50, 100]
  bloom_stratified: true
  tail_topic_threshold: 20
  measure_latency: true

diagnostics:
  gradient_attribution: true
  num_diagnostic_queries: 1000
  probing:
    probe_type: "linear"
    probe_tasks: ["bloom_level", "subject_area"]
    num_dimension_groups: 8

logging:
  use_wandb: true
  wandb_project: "bam-emnlp"
  wandb_entity: null
  log_every_n_steps: 10
