# BAM Option B: Bloom Static Scattered Mask (BloomMaskHead)
#
# Routing: Embedding(6, 768) → Gumbel-Softmax → scattered binary mask per Bloom level
# One fixed mask per Bloom level. Active dims are scattered — NOT FAISS sub-index compatible.
# Retrieval: normalize(q * mask_b) · normalize(corpus * mask_b) (pre-masked per level).
#
# SMEC-inspired improvements (arXiv 2510.12474):
#   1. Gumbel-Softmax replaces STE for discrete dimension selection (§3.3 ADS module)
#   2. 3-stage sequential loss schedule reduces gradient variance (§3.2 SMRL)
#   3. Unsupervised distillation loss forces masked embedding to preserve full-dim similarity (§3.4)
#   4. Increased hard negatives for stronger contrastive signal
#
# Prerequisite: optionA-working_pipeline.sh must have been run first.
#
# Loss schedule (2 stages):
#   Stage 1 (epochs 0-4):  contrastive + mrl_anchor + distillation
#   Stage 2 (epochs 5-14): + efficiency + mask_diversity + mask_variance
#                            distillation continues all 15 epochs (quality signal)
#
# Distillation is ON throughout: it forces the mask to select semantically informative
# dims (|Sim(full_i,j) - Sim(masked_i,j)| ≈ 0), which is the key quality signal.
# Gating it to Stage 1 only caused quality drops — masks picked dims satisfying
# diversity/sparsity but not semantic content.
#
# Run 2 diagnosis (mask cosine sim 0.40-0.51: diversity working; Apply 365 dims→0.3414 < A's 205→0.3724):
#   Root cause 1: mrl_anchor_weight=0.2 locked encoder in MRL-prefix structure → fixed: 0.0
#   Root cause 2: encoder_lr=2e-5 too low to reorganize dim-space → fixed: 5e-5
#   Root cause 3: dims too high (338-370 avg ~353, no efficiency advantage) → per-level targets
#   Root cause 4: distillation teacher=full MRL embedding biases masks to prefix-correlated dims → 0.15

model:
  backbone: "BAAI/bge-base-en-v1.5"
  embedding_dim: 768
  pooling: "cls"
  normalize_embeddings: true
  mrl_dims: [64, 128, 256, 384, 512, 768]
  use_mask_routing: true             # Option B: BloomMaskHead scattered mask
  mask_sparsity_target: null          # No sparsity target. Efficiency + contrastive equilibrium
                                     # determines dim count; cognitive init (0.28-0.48) ensures
                                     # cognitive ordering from the start.
  use_soft_bloom_routing: false      # N/A for Option B

data:
  train_path: "./data/real/train_curriculum.jsonl"
  val_path: "./data/real/val.jsonl"
  test_path: "./data/real/test.jsonl"
  corpus_path: "./data/real/corpus.jsonl"
  bloom_levels: {1: "Remember", 2: "Understand", 3: "Apply", 4: "Analyze", 5: "Evaluate", 6: "Create"}
  subjects: ["biology", "chemistry", "physics", "earth_science", "general_science"]
  max_query_length: 128
  max_passage_length: 256
  num_hard_negatives: 7              # Was 3. More diverse negatives per SMEC S-XBM insight.
                                     # NOTE: re-run data/curriculum_negatives.py if data was
                                     # mined with 3 negatives (it will pad/truncate otherwise).

training:
  seed: 42
  num_epochs: 15
  batch_size: 16
  gradient_accumulation_steps: 8
  fp16: true
  max_grad_norm: 1.0
  optimizer:
    type: "adamw"
    lr: 2.0e-5
    weight_decay: 0.01
    encoder_lr: 5.0e-5             # Was 2e-5. Higher LR needed for encoder to reorganize
                                   # dim-space away from MRL-prefix structure for scattered masks.
    router_lr: 2.0e-4              # BloomMaskHead bloom_logit — 10x encoder LR
  scheduler:
    type: "cosine"
    warmup_ratio: 0.1
  loss:
    contrastive_weight: 1.0
    efficiency_weight: 0.3         # Uniform compression pressure on all Bloom levels.
                                   # Provides downward pressure so dims don't float to 768.
    efficiency_uniform_weights: true  # true = equal weight for all levels (no cognitive ordering).
                                   # Cognitive weights (1-b/6) were wrong: Option A learned
                                   # Understand/Evaluate → 432 dims, others → 205-230 — not monotone.
    mrl_anchor_weight: 0.0         # Was 0.2. REMOVED: MRL anchor explicitly forces encoder to keep
                                   # prefix dims sharp (InfoNCE at d=64,128,256,384,512,768).
                                   # This locks the encoder in MRL-prefix-optimized structure and
                                   # prevents it from redistributing information to the scattered
                                   # dims Option B selects. Apply: 365 dims → 0.3414 WORSE than
                                   # Option A's 205 prefix dims proves the encoder isn't reorganizing.
    diversity_weight: 0.0          # RouterDiversityLoss is prefix-dim only (Option A)
    mask_sparsity_weight: 0.5      # Re-enabled with per-level targets below. Active dims (338-370)
                                   # are too high — Option A achieves same quality at 234 dims.
                                   # Per-level targets force different dim counts per Bloom level,
                                   # creating structural specialization independent of diversity loss.
    mask_level_targets:            # Per-level sparsity targets (fraction of 768 dims to keep active).
      0: 0.26                      # Remember (n=1198, 63.7%): simple factual → ~200 dims
      1: 0.50                      # Understand (n=28, 1.4%): complex conceptual → ~384 dims
      2: 0.30                      # Apply (n=290, 15.4%): procedural → ~230 dims
      3: 0.38                      # Analyze (n=110, 5.9%): structural → ~292 dims
      4: 0.55                      # Evaluate (n=72, 3.8%): critical → ~422 dims
      5: 0.32                      # Create (n=159, 8.5%): synthesis → ~246 dims
                                   # Average: 0.385 → ~296 dims (down from ~353, closer to A's 234)
    mask_diversity_weight: 0.4     # Was 0.3. Slightly stronger — masks are well-differentiated
                                   # (cosine 0.40-0.51) but Apply is still regressing vs Option A.
    mask_variance_weight: 0.3      # Per-dim variance across levels. Keep at 0.3 (working).
    mask_distill_weight: 0.15      # Was 0.3. Reduced: distillation teacher is the full MRL embedding,
                                   # which biases masks toward selecting prefix-correlated dims.
                                   # At weight 0.3 it fights encoder reorganization. At 0.15 it
                                   # still provides semantic signal without dominating.
    encoder_warmup_epochs: 5       # Stage 1 end: add efficiency + diversity + variance simultaneously
    mask_differentiation_epochs: 5 # Same as encoder_warmup_epochs → Stage 2 adds all losses at once
    temperature_schedule:
      start: 0.1
      end: 0.02
    gumbel_temperature_schedule:   # Anneals BloomMaskHead.gumbel_temperature each epoch
      start: 1.0                   # High τ: smoother/more exploratory discrete selection
      end: 0.1                     # Low τ: sharper, more deterministic (closer to hard mask)
    # bloom_frequencies injected at runtime by train_bam.py
  use_pcgrad: false
  encoder_freeze_after_epochs: null
  bloom_noise_rate: 0.0
  hard_neg_refresh_epochs: null
  checkpoint_dir: "/tmp/bam-b-ckpts2/"
  save_every_n_steps: 1000
  eval_every_n_steps: 500

evaluation:
  retrieval_ks: [1, 5, 10, 20, 50, 100]
  bloom_stratified: true
  tail_topic_threshold: 20
  measure_latency: true

diagnostics:
  gradient_attribution: true
  num_diagnostic_queries: 1000
  probing:
    probe_type: "linear"
    probe_tasks: ["bloom_level", "subject_area"]
    num_dimension_groups: 8

logging:
  use_wandb: true
  wandb_project: "bam-emnlp"
  wandb_entity: null
  log_every_n_steps: 10
