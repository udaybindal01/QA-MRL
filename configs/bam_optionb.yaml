# BAM Option B: Bloom Static Scattered Mask (BloomMaskHead)
#
# Routing: Embedding(6, 768) → sigmoid → static binary mask per Bloom level (STE)
# One fixed mask per Bloom level — no content-adaptive MLP. The encoder co-trains
# so each level's selected dims become maximally informative for that cognitive level.
# Active dims are scattered (not prefix-contiguous) — NOT FAISS sub-index compatible.
# Retrieval: masked_query · full_doc (zero dims ignored naturally in dot product).
#
# Prerequisite: optionA-working_pipeline.sh must have been run first.
#   - Reuses: ./data/real/train_curriculum.jsonl, val, test, corpus
#   - Reuses: /tmp/mrl-ckpts/best/  (MRL baseline encoder warm-start)
#
# Loss stack (Option B):
#   contrastive     (1.0) — InfoNCE: masked_q · full_doc
#   efficiency      (0.05)— cognitive-weighted compression
#   mrl_anchor      (0.0) — OFF: prefix structure conflicts with static scattered masks.
#                           The encoder must freely learn per-level dim clusters, not
#                           be constrained to prefix-hierarchical organization.
#   mask_sparsity   (0.3) — global sparsity target (0.44 → ~338 active dims)
#   mask_diversity  (0.3) — pairwise cosine penalty; static masks → stronger signal needed
#   mask_variance   (1.0) — per-dim variance across levels; primary differentiation signal
#   diversity       (0.0) — RouterDiversityLoss is Option A only (prefix dim spread)

model:
  backbone: "BAAI/bge-base-en-v1.5"
  embedding_dim: 768
  pooling: "cls"
  normalize_embeddings: true
  mrl_dims: [64, 128, 256, 384, 512, 768]
  use_mask_routing: true             # Option B: BloomMaskHead scattered soft mask
  mask_sparsity_target: 0.44         # global fallback; per-level targets come from loss config
  use_soft_bloom_routing: false      # N/A for Option B (no scalar dim to average)

data:
  train_path: "./data/real/train_curriculum.jsonl"
  val_path: "./data/real/val.jsonl"
  test_path: "./data/real/test.jsonl"
  corpus_path: "./data/real/corpus.jsonl"
  bloom_levels: {1: "Remember", 2: "Understand", 3: "Apply", 4: "Analyze", 5: "Evaluate", 6: "Create"}
  subjects: ["biology", "chemistry", "physics", "earth_science", "general_science"]
  max_query_length: 128
  max_passage_length: 256
  num_hard_negatives: 3

training:
  seed: 42
  num_epochs: 15
  batch_size: 16
  gradient_accumulation_steps: 8
  fp16: true
  max_grad_norm: 1.0
  optimizer:
    type: "adamw"
    lr: 2.0e-5
    weight_decay: 0.01
    encoder_lr: 2.0e-5
    router_lr: 2.0e-4              # BloomMaskHead MLP + bloom_bias — 10x encoder LR
  scheduler:
    type: "cosine"
    warmup_ratio: 0.1
  loss:
    contrastive_weight: 1.0
    efficiency_weight: 0.05        # Cognitive-weighted compression (Remember↓, Create↑)
    mrl_anchor_weight: 0.0         # OFF: static scattered masks need free encoder structure
    diversity_weight: 0.0          # RouterDiversityLoss is prefix-dim only (Option A)
    mask_sparsity_weight: 0.5      # Global sparsity toward mask_sparsity_target (0.44)
                                   # Higher now that contrastive no longer fights it (both sides masked)
    mask_diversity_weight: 0.3     # Pairwise cosine penalty; stronger for static masks
    mask_variance_weight: 1.0      # Per-dim variance across levels; primary signal
    encoder_warmup_epochs: 5       # Efficiency gate: sparsity/diversity/variance fire from epoch 0
    temperature_schedule:
      start: 0.1
      end: 0.02
    # bloom_frequencies injected at runtime by train_bam.py
  use_pcgrad: false
  encoder_freeze_after_epochs: null
  bloom_noise_rate: 0.0
  hard_neg_refresh_epochs: null
  checkpoint_dir: "/tmp/bam-b-ckpts/"
  save_every_n_steps: 1000
  eval_every_n_steps: 500

evaluation:
  retrieval_ks: [1, 5, 10, 20, 50, 100]
  bloom_stratified: true
  tail_topic_threshold: 20
  measure_latency: true

diagnostics:
  gradient_attribution: true
  num_diagnostic_queries: 1000
  probing:
    probe_type: "linear"
    probe_tasks: ["bloom_level", "subject_area"]
    num_dimension_groups: 8

logging:
  use_wandb: true
  wandb_project: "bam-emnlp"
  wandb_entity: null
  log_every_n_steps: 10
