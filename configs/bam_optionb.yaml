# BAM Option B: Bloom Static Scattered Mask (BloomMaskHead)
#
# Routing: Embedding(6, 768) → Gumbel-Softmax + STE → scattered binary mask per Bloom level
# One fixed mask per Bloom level. Active dims are scattered — NOT FAISS sub-index compatible.
# Retrieval: normalize(q * mask_b) · normalize(corpus * mask_b) (pre-masked per level).
#
# Run 10 — fix sparsity calibration: constrain eval-equivalent quantity (clean sigmoid).
#
#   Run 9 finding: per-level targets were set (Remember=230, Apply=207, etc.) but actual
#   eval dims overshot by ~75-80 (Remember=308, Apply=291). Root cause: BloomMaskSparsityLoss
#   constrained mean(sigmoid((logit+G)/τ)) — Gumbel-noisy, temperature-scaled — against the
#   target. But eval uses k = round(mean(sigmoid(logit)) * 768) — clean sigmoid, no Gumbel.
#   At τ=0.1, Gumbel offset ≈+0.577/τ inflates training fraction far above eval fraction,
#   so the loss "thinks" target is met at much higher logit values → systematic overshoot.
#
#   Fix: pass clean_sigmoid = sigmoid(logits) (no Gumbel, no τ) to BloomMaskSparsityLoss
#   and BloomTwoFactorEfficiencyLoss. This makes both losses constrain the EXACT quantity
#   that determines eval-time k, eliminating the systematic overshoot.
#
#   Per-level targets unchanged from run 9 (matched to Option A's distribution):
#     Remember:   0.30 → 230 dims  (Option A: 230)
#     Understand: 0.56 → 430 dims  (Option A: 432)
#     Apply:      0.27 → 207 dims  (Option A: 205)
#     Analyze:    0.28 → 215 dims  (Option A: 216)
#     Evaluate:   0.56 → 430 dims  (Option A: 432)
#     Create:     0.27 → 207 dims  (Option A: 207)
#     Average:    0.37 → 287 dims  (Option A: 234)

model:
  backbone: "BAAI/bge-base-en-v1.5"
  embedding_dim: 768
  pooling: "cls"
  normalize_embeddings: true
  mrl_dims: [64, 128, 256, 384, 512, 768]
  use_mask_routing: true             # Option B: BloomMaskHead scattered mask
  mask_sparsity_target: null          # Using per-level targets (mask_level_targets below).
                                     # Global target overridden when per-level targets provided.
  use_soft_bloom_routing: false      # N/A for Option B

data:
  train_path: "./data/real/train_curriculum.jsonl"
  val_path: "./data/real/val.jsonl"
  test_path: "./data/real/test.jsonl"
  corpus_path: "./data/real/corpus.jsonl"
  bloom_levels: {1: "Remember", 2: "Understand", 3: "Apply", 4: "Analyze", 5: "Evaluate", 6: "Create"}
  subjects: ["biology", "chemistry", "physics", "earth_science", "general_science"]
  max_query_length: 128
  max_passage_length: 256
  num_hard_negatives: 7

training:
  seed: 42
  num_epochs: 20
  batch_size: 16
  gradient_accumulation_steps: 8
  fp16: true
  max_grad_norm: 1.0
  optimizer:
    type: "adamw"
    lr: 2.0e-5
    weight_decay: 0.01
    encoder_lr: 2.0e-5
    router_lr: 2.0e-4              # BloomMaskHead bloom_logit — 10x encoder LR
  scheduler:
    type: "cosine"
    warmup_ratio: 0.1
  loss:
    contrastive_weight: 1.0
    efficiency_weight: 0.3         # Moderate compression. Per-level targets do the heavy lifting.
    efficiency_uniform_weights: true   # Uniform weights — cognitive ordering (1-b/6) doesn't
                                       # match data (Option A: Understand/Evaluate=432, not monotone).
    mrl_anchor_weight: 0.0         # Intentionally 0. MRL anchor runs InfoNCE at prefix dims
                                   # [64,128,256,...], reinforcing prefix structure in encoder.
                                   # This is exactly wrong for scattered masks. Distillation
                                   # (0.3) provides quality signal without prefix bias.
    diversity_weight: 0.0          # RouterDiversityLoss is prefix-dim only (Option A)
    mask_sparsity_weight: 1.0      # Strong: must overcome contrastive pressure to hold per-level targets.
                                   # At 0.4-0.5, all levels drifted to ~365 (ignoring targets).
    mask_level_targets:            # Per-level targets matched to Option A's learned dim distribution.
      0: 0.30                      # Remember: 230 dims (A: 230)  — 63.7% of queries
      1: 0.56                      # Understand: 430 dims (A: 432) — 1.4% of queries
      2: 0.27                      # Apply: 207 dims (A: 205)     — 15.4% of queries
      3: 0.28                      # Analyze: 215 dims (A: 216)   — 5.9% of queries
      4: 0.56                      # Evaluate: 430 dims (A: 432)  — 3.8% of queries
      5: 0.27                      # Create: 207 dims (A: 207)    — 8.5% of queries
    mask_diversity_weight: 0.5     # Pushes 6 mask patterns apart. With per-level dim COUNT
                                   # targets, diversity ensures different dim SELECTION too.
    mask_diversity_margin: 0.0     # Full cosine penalty (margin=0.3 was only 0.14-0.22 effective).
    mask_variance_weight: 0.3      # Per-dim variance across levels — 768 gradient signals vs 15 pairs.
                                   # Complements diversity: rewards each dim being "owned" by specific levels.
    mask_distill_weight: 0.3       # Always-on quality signal without prefix bias.
    encoder_warmup_epochs: 3       # MRL init already domain-adapted — 3 epochs enough before
                                   # compression activates (was 5 for base init).
    mask_differentiation_epochs: 3 # Same as encoder_warmup_epochs.
    temperature_schedule:
      start: 0.1
      end: 0.02
    gumbel_temperature_schedule:   # Anneals BloomMaskHead.gumbel_temperature each epoch
      start: 1.0                   # High τ: exploratory
      end: 0.1                     # τ=0.01 was too aggressive (Gumbel noise dominated logits,
                                   # high variance late training). τ=0.1 was best empirically
                                   # (run 4: R@10=0.5767).
    # bloom_frequencies injected at runtime by train_bam.py
  use_pcgrad: false
  encoder_freeze_after_epochs: null
  bloom_noise_rate: 0.0
  hard_neg_refresh_epochs: null
  checkpoint_dir: "/tmp/bam-b-ckpts10/"
  save_every_n_steps: 1000
  eval_every_n_steps: 500

evaluation:
  retrieval_ks: [1, 5, 10, 20, 50, 100]
  bloom_stratified: true
  tail_topic_threshold: 20
  measure_latency: true

diagnostics:
  gradient_attribution: true
  num_diagnostic_queries: 1000
  probing:
    probe_type: "linear"
    probe_tasks: ["bloom_level", "subject_area"]
    num_dimension_groups: 8

logging:
  use_wandb: true
  wandb_project: "bam-emnlp"
  wandb_entity: null
  log_every_n_steps: 10
